<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="32%" cy="22%" r="95%">
      <stop offset="0%" stop-color="#5a3aa6"/>
      <stop offset="55%" stop-color="#2b1f63"/>
      <stop offset="100%" stop-color="#160f33"/>
    </radialGradient>
    <linearGradient id="candle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6dffb0"/>
      <stop offset="100%" stop-color="#1fbf68"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd34f"/>
      <stop offset="50%" stop-color="#ff4f9a"/>
      <stop offset="100%" stop-color="#3ee6ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="26" y="26" width="460" height="460" rx="108" fill="url(#bg)" stroke="url(#ring)" stroke-width="14"/>

  <!-- twinkles -->
  <g fill="#fff" opacity="0.85">
    <circle cx="120" cy="110" r="5"/>
    <circle cx="402" cy="138" r="4"/>
    <circle cx="392" cy="300" r="5"/>
    <circle cx="138" cy="372" r="4"/>
  </g>
  <g fill="#ffd34f" opacity="0.9">
    <circle cx="356" cy="96" r="4"/>
    <circle cx="96" cy="250" r="4"/>
  </g>

  <!-- red losing candle (background, smaller) -->
  <g opacity="0.9">
    <rect x="168" y="150" width="16" height="150" rx="6" fill="#ff5a5a"/>
    <rect x="150" y="188" width="52" height="92" rx="12" fill="#ff5a5a"/>
  </g>

  <!-- green winning candle (hero) -->
  <g filter="url(#glow)">
    <rect x="300" y="120" width="20" height="250" rx="8" fill="#6dffb0"/>
    <rect x="276" y="168" width="68" height="150" rx="16" fill="url(#candle)" stroke="#a9ffd2" stroke-width="4"/>
  </g>

  <!-- spark -->
  <path filter="url(#glow)" d="M364 196 l-30 60 l26 0 l-20 56 l60 -78 l-28 0 l24 -50 z"
        fill="#ffe267" stroke="#fff6cf" stroke-width="3" stroke-linejoin="round"/>
</svg>
